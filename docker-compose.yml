services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - .:/app
      - composer-cache:/tmp/composer
    environment:
      COMPOSER_HOME: /tmp/composer

  composer:
    image: composer:2.9.5
    working_dir: /app
    volumes:
      - .:/app
      - composer-cache:/tmp/composer
    entrypoint: ["composer"]
    command: ["install"]

volumes:
  composer-cache:

